name: Unzip to Root
on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  unzip-files:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract and Flatten
        run: |
          # 1. Create a temp directory
          mkdir -p temp_extract
          
          # 2. Extract into the temp directory
          # Replace 'your-archive.zip' with your actual filename
          unzip -qq "cookili.zip" -d temp_extract
          
          # 3. Move files to the root, ignoring the temp dir and .git
          # This pulls files out of whatever subfolder the zip might contain
          cp -rn temp_extract/* .
          
          # 4. Clean up
          rm -rf temp_extract

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          
          # Stage changes
          git add .
          
          # Check if there are changes to commit
          if ! git diff --cached --quiet; then
            git commit -m "Unzip files to repository root"
            git push
          else
            echo "No changes to commit"
          fi
