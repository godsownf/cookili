name: Unzip to Root
on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  unzip-files:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract and Flatten
        run: |
          # 1. Create a temporary folder
          mkdir -p temp_dir
          
          # 2. Extract into temp_dir
          unzip -q "cookili.zip" -d temp_dir
          
          # 3. Move everything from the sub-folder(s) into the root
          # This finds any folder inside temp_dir and moves its contents to current dir
          find temp_dir -mindepth 1 -maxdepth 1 -type d -exec mv {}/* . \;
          
          # 4. Clean up
          rm -rf temp_dir
          
      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          
          # Stage changes
          git add .
          
          # Check if there are changes to commit
          if ! git diff --cached --quiet; then
            git commit -m "Unzip files to repository root"
            git push
          else
            echo "No changes to commit"
          fi
